<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 480px;">

    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">💼 ReimbursementTracker</h2>
      <p class="text-muted">Create your account</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

    <form (ngSubmit)="onRegister()">

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">First Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="First name"
            [(ngModel)]="registerData.firstName"
            name="firstName"
            required
          />
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Last Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Last name"
            [(ngModel)]="registerData.lastName"
            name="lastName"
            required
          />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input
          type="email"
          class="form-control"
          placeholder="Enter your email"
          [(ngModel)]="registerData.email"
          name="email"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input
          type="password"
          class="form-control"
          placeholder="Enter your password"
          [(ngModel)]="registerData.password"
          name="password"
          required
        />
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Role</label>
        <select
          class="form-select"
          [(ngModel)]="registerData.roleId"
          name="roleId"
          required
        >
          <option value="">Select your role</option>
          <option *ngFor="let role of roles" [value]="role.id">
            {{ role.name }}
          </option>
        </select>
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100 mt-2"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading">Registering...</span>
        <span *ngIf="!isLoading">Register</span>
      </button>

    </form>

    <div class="text-center mt-3">
      <small>Already have an account?
        <a routerLink="/login" class="text-primary fw-semibold">Login here</a>
      </small>
    </div>

  </div>
</div>
