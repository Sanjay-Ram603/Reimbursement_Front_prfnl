<div class="container py-4 px-4">

  <div class="d-flex align-items-center mb-4 gap-3">
    <button class="btn btn-outline-secondary btn-sm" [routerLink]="['/my-claims']">
      ← Back
    </button>
    <div>
      <h3 class="fw-bold mb-1">✏️ Edit Claim</h3>
      <p class="text-muted mb-0">You can only edit claims that are in Submitted status</p>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Loading claim...</p>
  </div>

  <div *ngIf="!isLoading && !errorMessage" class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <form (ngSubmit)="onUpdate()">

        <div class="mb-3">
          <label class="form-label fw-semibold">
            Amount (₹) <span class="text-danger">*</span>
          </label>
          <input
            type="number"
            class="form-control"
            placeholder="Enter amount"
            [(ngModel)]="amount"
            name="amount"
            min="1"
            required
          />
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">
            Description <span class="text-danger">*</span>
          </label>
          <textarea
            class="form-control"
            placeholder="Describe the expense..."
            [(ngModel)]="description"
            name="description"
            rows="3"
            required
          ></textarea>
        </div>

        <div class="d-flex gap-2">
          <button
            type="submit"
            class="btn btn-primary px-4"
            [disabled]="isSaving"
          >
            <span *ngIf="isSaving">Saving...</span>
            <span *ngIf="!isSaving">💾 Save Changes</span>
          </button>
          <button
            type="button"
            class="btn btn-outline-secondary px-4"
            [routerLink]="['/my-claims']"
          >
            Cancel
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
